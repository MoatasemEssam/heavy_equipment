services:

  # ── Message Bus ──────────────────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft (no Zookeeper)
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # Single PLAINTEXT listener for inter-container communication
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_CFG_MESSAGE_MAX_BYTES=10485760
      - KAFKA_CFG_REPLICA_FETCH_MAX_BYTES=10485760
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: equipment_db_container
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=equipment_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── DB Consumer ──────────────────────────────────────────────────────────────
  db_service:
    build:
      context: ./db_service
    container_name: db_service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - DB_HOST=postgres
      - DB_NAME=equipment_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_PORT=5432
    restart: on-failure

  # ── Streamlit UI ─────────────────────────────────────────────────────────────
  ui_service:
    build:
      context: ./ui_service
    container_name: ui_service
    ports:
      - "8501:8501"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - DB_HOST=postgres
      - DB_NAME=equipment_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_PORT=5432
    restart: on-failure

  # ── CV / Detection Service ───────────────────────────────────────────────────
  # NOTE: Place your video file in ./cv_service/videos/ and set VIDEO_PATH below.
  cv_service:
    build:
      context: ./cv_service
    container_name: cv_service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - VIDEO_PATH=/app/videos/equipment_video.mp4   # change filename as needed
    volumes:
      - ./cv_service/videos:/app/videos              # mount your video folder here
    restart: on-failure

volumes:
  postgres_data: